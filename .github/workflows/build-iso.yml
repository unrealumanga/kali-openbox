name: Build Kali Openbox ISO
on: [workflow_dispatch, push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kalilinux/kali-rolling
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y git live-build simple-cdd debootstrap curl squashfs-tools xorriso sudo
      - run: git clone https://gitlab.com/kalilinux/build-scripts/live-build-config.git
      - run: cp config/package-lists/openbox.list.chroot live-build-config/kali-config/variant-default/package-lists/
      - run: cd live-build-config && ./build.sh --variant default --verbose
      - uses: actions/upload-artifact@v4
        with:
          name: kali-openbox-iso
          path: live-build-config/images/*.iso

name: Build Kali Openbox ISO
on: [workflow_dispatch, push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kalilinux/kali-rolling
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y curl git live-build simple-cdd debootstrap squashfs-tools xorriso
      - run: ./build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: kali-openbox-iso
          path: build/*.iso
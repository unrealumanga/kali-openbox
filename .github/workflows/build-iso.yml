name: Build Kali Openbox ISO

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Kali version (default: latest)'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            wget \
            git \
            curl \
            gnupg \
            debootstrap \
            squashfs-tools \
            xorriso \
            isolinux

      - name: Setup build directory
        run: |
          sudo mkdir -p /usr/share/keyrings
          wget -q https://archive.kali.org/archive-key.asc -O - | sudo gpg --dearmor -o /usr/share/keyrings/kali-archive-keyring.gpg
          sudo chmod 644 /usr/share/keyrings/kali-archive-keyring.gpg
          mkdir -p build
          cd build
          sudo lb config \
            --mode debian \
            --distribution kali-rolling \
            --archive-areas "main contrib non-free non-free-firmware" \
            --mirror-bootstrap http://http.kali.org/kali \
            --mirror-chroot http://http.kali.org/kali \
            --mirror-chroot-security http://http.kali.org/kali \
            --mirror-binary http://http.kali.org/kali \
            --mirror-binary-security http://http.kali.org/kali \
            --parent-mirror-bootstrap http://http.kali.org/kali \
            --parent-mirror-chroot http://http.kali.org/kali \
            --parent-mirror-chroot-security http://http.kali.org/kali \
            --parent-mirror-binary http://http.kali.org/kali \
            --parent-mirror-binary-security http://http.kali.org/kali \


      - name: Copy config files
        run: |
          sudo cp -r config/* build/config/
          sudo cp -r scripts/* build/

      - name: Build ISO
        run: |
          cd build
          set -eo pipefail; sudo lb build 2>&1 | tee build.log

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: kali-openbox-iso
          path: build/*.iso
          retention-days: 7

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/build.log
          retention-days: 7

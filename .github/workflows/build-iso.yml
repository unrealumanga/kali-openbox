name: Build Kali ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kalilinux/kali-rolling
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: apt update && apt install -y curl git live-build simple-cdd debootstrap

      - name: Build ISO
        run: |
          mkdir -p build
          cd build && lb config ... && lb build
